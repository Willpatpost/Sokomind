name: Huge Performance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  huge:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Run Huge performance suite
        run: node bench/benchmark.js --suite huge --jsonl > huge-performance.jsonl
        env:
          NODE_OPTIONS: --max-old-space-size=256
      - name: Enforce reviewed Huge regression ceilings
        run: node bench/huge-performance-gate.js huge-performance.jsonl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: huge-performance-${{ github.run_id }}
          path: huge-performance.jsonl
          if-no-files-found: error
